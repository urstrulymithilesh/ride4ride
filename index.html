<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Ride4Ride helps people quickly find, offer, or browse rides."
    />
    <title>Ride4Ride</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="landing" aria-labelledby="landing-title">
      <section class="hero" aria-describedby="landing-subtitle">
        <p class="eyebrow">Ride4Ride</p>
        <h1 id="landing-title">Where are you headed?</h1>
        <p id="landing-subtitle" class="subtitle">
          Choose how you want to get moving today.
        </p>

        <div class="actions" aria-label="Primary actions">
          <a class="action-card" href="/need-ride" aria-label="Need Ride">
            <span class="action-icon" aria-hidden="true">→</span>
            <span class="action-title">Need Ride</span>
            <span class="action-copy">Request a ride from someone nearby.</span>
          </a>

          <a class="action-card" href="/give-ride" aria-label="Give Ride">
            <span class="action-icon" aria-hidden="true">+</span>
            <span class="action-title">Give Ride</span>
            <span class="action-copy">Offer a seat and help someone get there.</span>
          </a>

          <a
            class="action-card"
            href="/available-rides"
            aria-label="See Available Rides"
          >
            <span class="action-icon" aria-hidden="true">⌕</span>
            <span class="action-title">See Available Rides</span>
            <span class="action-copy">Browse ride listings currently available.</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
